# ==============================================================================
# GitHub Actions Workflow: 自动构建与同步 unity-mcp Server 镜像
# ==============================================================================
#
# 📌 镜像推送目标：ghcr.io/<当前仓库owner>/unity-mcp-server
# 
# 📝 标签（Tag）说明与最佳实践：
#   1. 固定版本 tag（例如 v9.6.8）：
#      - 表示当前自动构建到的特定上游 Release 版本。
#      - 强烈建议在 NAS 生产环境中使用固定版本 tag，以追求极致的安全与稳定，避免自动升级带来的不兼容问题。
#   2. "latest" tag：
#      - 由本 workflow 维护的“我们自己构建仓库中的最新上游 release 镜像”。
#      - 适合测试环境，或希望无缝自动跟随上游更新的用户。
# 
# 🛡️ 安全合规说明：
#   - 镜像本身仅负责打包 mcp-for-unity server 运行时环境，绝不包含任何运行时敏感信息。
#   - 任何运行时参数（如 n8n URL、API Key、Service Token、MCPHub 地址等）必须通过 NAS 上的
#     docker-compose.yml 或 .env 环境变量提供。
#
# ==============================================================================

name: Sync & Build unity-mcp Server

on:
  schedule:
    # 每天凌晨 0:00 (UTC) 自动运行一次，实现免维护全自动检查
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version/tag from CoplayDev/unity-mcp to build (e.g., v9.6.8). Leave empty for latest release.'
        required: false
        type: string
        default: ''
      force:
        description: 'Force rebuild and push even if the image version tag already exists in GHCR.'
        required: false
        type: boolean
        default: false

# 全局环境变量：强制将 JavaScript Actions 运行在 Node.js 24 环境，消除 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# 最小化工作流权限，仅授予读取本仓内容和向 GHCR 写入 Package 的权限
permissions:
  contents: read
  packages: write

jobs:
  sync-and-build:
    name: Sync, Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Image Name
        run: |
          # GHCR 要求镜像库 Owner 为纯小写，将 github.repository_owner 转换为小写
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER_LOWER}/unity-mcp-server" >> $GITHUB_ENV

      - name: Resolve Target Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 始终获取上游仓库真实的最新 Release 版本
          REAL_LATEST_TAG=$(gh api repos/CoplayDev/unity-mcp/releases/latest --jq .tag_name)
          if [ -z "$REAL_LATEST_TAG" ] || [ "$REAL_LATEST_TAG" = "null" ]; then
            echo "Error: Failed to fetch the latest release tag from upstream repository." >&2
            exit 1
          fi
          echo "REAL_LATEST_TAG=$REAL_LATEST_TAG" >> $GITHUB_ENV
          echo "Real upstream latest release: $REAL_LATEST_TAG"

          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "Using manually specified version: $INPUT_VERSION"
            echo "VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          else
            echo "No version specified. Resolving to latest release: $REAL_LATEST_TAG"
            echo "VERSION=$REAL_LATEST_TAG" >> $GITHUB_ENV
          fi

      - name: Check if image tag already exists in GHCR
        run: |
          echo "Checking if version ${{ env.VERSION }} already exists in GHCR..."
          if docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ env.VERSION }} > /dev/null 2>&1; then
            echo "Image tag ${{ env.VERSION }} already exists."
            echo "EXISTS=true" >> $GITHUB_ENV
          else
            echo "Image tag ${{ env.VERSION }} does not exist in GHCR."
            echo "EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Determine if build is skipped
        run: |
          FORCE_BUILD="${{ inputs.force }}"
          if [ "${{ env.EXISTS }}" = "true" ] && [ "$FORCE_BUILD" != "true" ]; then
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            echo "=========================================================================="
            echo "SKIPPING BUILD: The tag ${{ env.VERSION }} already exists in GHCR."
            echo "If you want to force rebuild this version, run the workflow manually with 'force' set to true."
            echo "=========================================================================="
          else
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
            echo "Build will proceed. (EXISTS=${{ env.EXISTS }}, FORCE_BUILD=$FORCE_BUILD)"
          fi

      - name: Resolve Pushed Tags
        if: env.SKIP_BUILD != 'true'
        run: |
          TAGS="${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
          if [ "${{ env.VERSION }}" = "${{ env.REAL_LATEST_TAG }}" ]; then
            echo "Building the latest version. Including 'latest' tag..."
            TAGS="${TAGS}
${{ env.IMAGE_NAME }}:latest"
          else
            echo "Building a non-latest or historical version (${{ env.VERSION }}). Excluding 'latest' tag to avoid overwriting!"
          fi
          
          # 写入多行全局环境变量，使用 EOF 块定义
          echo "RESOLVED_TAGS<<EOF" >> $GITHUB_ENV
          echo "$TAGS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Checkout upstream repository
        if: env.SKIP_BUILD != 'true'
        uses: actions/checkout@v4
        with:
          repository: CoplayDev/unity-mcp
          ref: ${{ env.VERSION }}

      - name: Build and push Server Docker Image
        if: env.SKIP_BUILD != 'true'
        uses: docker/build-push-action@v6
        with:
          # 注意：上游 Server/Dockerfile 中含有 "COPY . /app"，所以构建上下文（context）必须是仓库根目录，而不能是 Server 目录。
          context: .
          file: Server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.RESOLVED_TAGS }}
          # 启用 GitHub Actions 缓存以加快后续构建速度并减少资源消耗
          cache-from: type=gha
          cache-to: type=gha,mode=max
